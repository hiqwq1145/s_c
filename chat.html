<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: rgba(30, 30, 46, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .calc-screen {
            background: rgba(10, 10, 18, 0.8);
            border-radius: 32px;
            padding: 24px 20px;
            margin-bottom: 20px;
            text-align: right;
            font-size: 48px;
            font-weight: 500;
            color: #4ade80;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            word-break: break-all;
            min-height: 100px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .calc-btn {
            background: rgba(45, 45, 58, 0.9);
            padding: 20px 0;
            text-align: center;
            border-radius: 28px;
            font-size: 24px;
            font-weight: 600;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.1s ease;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .calc-btn:active { transform: scale(0.96); background: rgba(55, 55, 75, 0.9); }
        .calc-btn.operator { background: rgba(59, 130, 246, 0.7); color: white; }
        .calc-btn.equals { background: rgba(74, 222, 128, 0.8); color: white; }
        .calc-btn.clear { background: rgba(239, 68, 68, 0.7); color: white; }

        .chat-area {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(30, 41, 59, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-title { font-weight: 600; color: #cbd5e1; font-size: 15px; }
        .chat-status { font-size: 12px; padding: 4px 12px; background: rgba(74, 222, 128, 0.2); border-radius: 30px; color: #4ade80; }
        .close-chat, .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #94a3b8;
            font-size: 20px;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            cursor: pointer;
            margin-left: 8px;
        }
        .logout-btn { background: rgba(239, 68, 68, 0.7); color: white; font-size: 13px; width: auto; padding: 0 12px; }

        .messages-container {
            height: 380px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .message.my { align-self: flex-end; }
        .message.other { align-self: flex-start; }

        .bubble {
            padding: 12px 16px;
            border-radius: 24px;
            word-break: break-word;
            font-size: 15px;
            line-height: 1.4;
        }
        .message.my .bubble {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border-bottom-right-radius: 6px;
        }
        .message.other .bubble {
            background: rgba(51, 65, 85, 0.9);
            color: #f1f5f9;
            border-bottom-left-radius: 6px;
        }

        .message-name {
            font-size: 11px;
            margin-bottom: 4px;
            margin-left: 8px;
            color: #94a3b8;
        }
        .message.my .message-name { text-align: right; margin-right: 8px; }
        .message-time {
            font-size: 10px;
            margin-top: 4px;
            margin-left: 12px;
            color: #64748b;
        }
        .message.my .message-time { text-align: right; margin-right: 12px; }

        .input-area {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: rgba(30, 41, 59, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 40px;
            background: rgba(15, 23, 42, 0.9);
            color: #f1f5f9;
            font-size: 15px;
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-area input:focus { border-color: #10b981; }
        .input-area button {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 0 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .input-area button:active { transform: scale(0.96); }

        .error-msg { color: #ef4444; font-size: 12px; text-align: center; margin-top: 8px; }
        .login-hint { text-align: center; margin-top: 8px; color: #64748b; font-size: 12px; }
        .date-separator {
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
            margin: 8px 0;
            position: relative;
        }
        .date-separator span {
            background: rgba(30, 41, 59, 0.6);
            padding: 4px 12px;
            border-radius: 30px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="calc-screen" id="calcScreen">0</div>
    <div class="calc-buttons">
        <div class="calc-btn" data-val="7">7</div><div class="calc-btn" data-val="8">8</div><div class="calc-btn" data-val="9">9</div><div class="calc-btn operator" data-val="/">÷</div>
        <div class="calc-btn" data-val="4">4</div><div class="calc-btn" data-val="5">5</div><div class="calc-btn" data-val="6">6</div><div class="calc-btn operator" data-val="*">×</div>
        <div class="calc-btn" data-val="1">1</div><div class="calc-btn" data-val="2">2</div><div class="calc-btn" data-val="3">3</div><div class="calc-btn operator" data-val="-">-</div>
        <div class="calc-btn" data-val="0">0</div><div class="calc-btn clear" data-val="C">C</div><div class="calc-btn equals" data-val="=">=</div><div class="calc-btn operator" data-val="+">+</div>
    </div>

    <div id="loginHint" class="login-hint">输入密码后按「=」登录</div>
    <div id="loginError" class="error-msg"></div>

    <div id="chatArea" class="chat-area" style="display: none;">
        <div class="chat-header">
            <span class="chat-title">💬 备忘录</span>
            <span id="onlineStatus" class="chat-status">在线</span>
            <div style="display: flex;">
                <button id="logoutMiniBtn" class="logout-btn">退出</button>
                <button id="closeChatBtn" class="close-chat">✕</button>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div style="text-align: center; color: #64748b; padding: 40px;">加载中...</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="写点什么..." autocomplete="off">
            <button id="sendMsgBtn">发送</button>
        </div>
    </div>
</div>

<script>
    // ---------- 计算器逻辑 ----------
    let calcValue = '0';
    let lastOperator = null;
    let pendingValue = null;
    const calcScreen = document.getElementById('calcScreen');
    function updateCalcScreen() { calcScreen.innerText = calcValue; }

    function handleCalcInput(val) {
        document.getElementById('loginError').innerText = '';
        if (val === 'C') {
            calcValue = '0'; lastOperator = null; pendingValue = null;
            updateCalcScreen();
        } else if (val === '=') {
            const pwd = calcValue.trim();
            if (pwd && !authActive) doLogin(pwd);
            else if (authActive && lastOperator && pendingValue !== null) {
                const cur = parseFloat(calcValue);
                let result;
                if (lastOperator === '+') result = pendingValue + cur;
                else if (lastOperator === '-') result = pendingValue - cur;
                else if (lastOperator === '*') result = pendingValue * cur;
                else if (lastOperator === '/') result = pendingValue / cur;
                calcValue = String(result);
                lastOperator = null; pendingValue = null;
                updateCalcScreen();
            }
        } else if (['+','-','*','/'].includes(val) && authActive) {
            if (lastOperator && pendingValue !== null) {
                const cur = parseFloat(calcValue);
                let result;
                if (lastOperator === '+') result = pendingValue + cur;
                else if (lastOperator === '-') result = pendingValue - cur;
                else if (lastOperator === '*') result = pendingValue * cur;
                else if (lastOperator === '/') result = pendingValue / cur;
                calcValue = String(result);
                updateCalcScreen();
            }
            pendingValue = parseFloat(calcValue);
            lastOperator = val;
            calcValue = '0';
            updateCalcScreen();
        } else {
            if (calcValue === '0') calcValue = val;
            else calcValue += val;
            updateCalcScreen();
        }
    }

    document.querySelectorAll('.calc-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const v = btn.dataset.val;
            if (v) handleCalcInput(v);
        });
    });

    // ---------- 聊天逻辑 ----------
    let authActive = false;
    let myRole = null;
    let refreshInterval = null;
    let heartbeatInterval = null;
    let lastMessagesHash = '';      // 用于避免无变化时重绘
    let currentScrollPos = 0;      // 保存滚动位置

    const chatArea = document.getElementById('chatArea');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendMsgBtn = document.getElementById('sendMsgBtn');
    const closeChatBtn = document.getElementById('closeChatBtn');
    const logoutMiniBtn = document.getElementById('logoutMiniBtn');
    const loginHintDiv = document.getElementById('loginHint');
    const onlineStatusSpan = document.getElementById('onlineStatus');

    // 工具函数：将后端时间字符串转为本地时间对象
    function parseTimeString(timeStr) {
        // 旧格式 "HH:MM:SS" (UTC)
        if (/^\d{2}:\d{2}:\d{2}$/.test(timeStr)) {
            const [h,m,s] = timeStr.split(':').map(Number);
            const now = new Date();
            const utcDate = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), h, m, s));
            return utcDate;
        }
        // 新格式 ISO 字符串
        return new Date(timeStr);
    }

    // 格式化显示时间：同一天显示 "HH:MM"，不同天显示 "MM/DD HH:MM"
    function formatMessageTime(isoOrTimeStr) {
        const date = parseTimeString(isoOrTimeStr);
        if (isNaN(date.getTime())) return isoOrTimeStr;
        const now = new Date();
        const isToday = date.toDateString() === now.toDateString();
        const hours = date.getHours().toString().padStart(2,'0');
        const minutes = date.getMinutes().toString().padStart(2,'0');
        if (isToday) return `${hours}:${minutes}`;
        const month = (date.getMonth()+1).toString().padStart(2,'0');
        const day = date.getDate().toString().padStart(2,'0');
        return `${month}/${day} ${hours}:${minutes}`;
    }

    // 获取消息的日期键 (YYYY-MM-DD) 用于分组
    function getDateKey(timeStr) {
        const date = parseTimeString(timeStr);
        if (isNaN(date.getTime())) return '';
        return `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2,'0')}-${date.getDate().toString().padStart(2,'0')}`;
    }

    // 渲染消息列表（保留滚动位置，仅在内容变化时重绘）
    async function loadMessages(keepScroll = true) {
        if (!authActive) return;
        try {
            const resp = await fetch('/messages');
            if (resp.status === 401) { logout(); return; }
            const msgs = await resp.json();
            if (!msgs || msgs.length === 0) {
                if (messagesContainer.innerHTML !== '<div style="text-align:center; color:#64748b; padding:40px;">✨ 暂无消息，发点什么吧</div>') {
                    messagesContainer.innerHTML = '<div style="text-align:center; color:#64748b; padding:40px;">✨ 暂无消息，发点什么吧</div>';
                }
                return;
            }

            // 生成 hash 判断消息是否有变化
            const newHash = JSON.stringify(msgs.map(m => ({text:m.text, sender:m.sender, time:m.time})));
            if (newHash === lastMessagesHash && keepScroll) return;
            lastMessagesHash = newHash;

            // 保存当前滚动位置
            if (keepScroll) currentScrollPos = messagesContainer.scrollTop;

            // 按日期分组
            let lastDate = '';
            let html = '';
            for (let i = 0; i < msgs.length; i++) {
                const msg = msgs[i];
                const dateKey = getDateKey(msg.time);
                if (dateKey && dateKey !== lastDate) {
                    if (lastDate !== '') html += '</div>';
                    const displayDate = new Date(dateKey).toLocaleDateString('zh-CN', { month:'numeric', day:'numeric' });
                    html += `<div class="date-separator"><span>${displayDate}</span></div>`;
                    lastDate = dateKey;
                }
                const isMe = (myRole === 'boy' && msg.sender === 'boy') || (myRole === 'girl' && msg.sender === 'girl');
                const senderName = msg.sender === 'boy' ? '我' : '她';
                const alignClass = isMe ? 'my' : 'other';
                const displayTime = formatMessageTime(msg.time);
                html += `
                    <div class="message ${alignClass}">
                        <div class="message-name">${senderName}</div>
                        <div class="bubble">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${displayTime}</div>
                    </div>
                `;
            }
            messagesContainer.innerHTML = html;

            // 恢复滚动位置
            if (keepScroll) messagesContainer.scrollTop = currentScrollPos;
        } catch (err) { console.log('加载消息失败', err); }
    }

    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        try {
            const resp = await fetch('/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });
            if (resp.status === 401) { logout(); return; }
            messageInput.value = '';
            // 发送后强制刷新并滚动到底部（新消息）
            await loadMessages(false);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            lastMessagesHash = ''; // 强制下次刷新重新计算hash
        } catch (err) { alert('发送失败'); }
    }

    async function doLogin(password) {
        try {
            const resp = await fetch('/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await resp.json();
            if (resp.ok && data.status === 'ok') {
                authActive = true;
                myRole = data.role;
                loginHintDiv.style.display = 'none';
                chatArea.style.display = 'block';
                onlineStatusSpan.innerText = myRole === 'boy' ? '我 在线' : '她 在线';
                calcValue = '0'; updateCalcScreen();
                await loadMessages(false);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                if (refreshInterval) clearInterval(refreshInterval);
                refreshInterval = setInterval(() => loadMessages(true), 4000);
                if (heartbeatInterval) clearInterval(heartbeatInterval);
                heartbeatInterval = setInterval(checkHeartbeat, 15000);
            } else {
                document.getElementById('loginError').innerText = '密码错误，试试 0708 或 0213';
                calcValue = '0'; updateCalcScreen();
            }
        } catch (err) {
            document.getElementById('loginError').innerText = '网络错误';
        }
    }

    async function checkHeartbeat() {
        if (!authActive) return;
        try {
            const resp = await fetch('/check_auth');
            const data = await resp.json();
            if (!data.valid) { alert('会话已过期'); logout(); }
        } catch(e) {}
    }

    function logout() {
        authActive = false;
        if (refreshInterval) clearInterval(refreshInterval);
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        chatArea.style.display = 'none';
        loginHintDiv.style.display = 'block';
        document.getElementById('loginError').innerText = '';
        messagesContainer.innerHTML = '<div style="text-align:center; color:#64748b; padding:40px;">加载中...</div>';
        localStorage.clear(); sessionStorage.clear();
        calcValue = '0'; updateCalcScreen();
        lastMessagesHash = '';
    }

    sendMsgBtn.onclick = sendMessage;
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    closeChatBtn.onclick = () => { chatArea.style.display = 'none'; loginHintDiv.style.display = 'block'; };
    logoutMiniBtn.onclick = logout;

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }
</script>
</body>
</html>

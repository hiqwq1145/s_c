<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>计算器</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body { 
            background: #1e1e2f; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', system-ui;
        }
        .fake-calculator {
            background: #2d2d3a;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 320px;
        }
        .fake-screen {
            background: #1a1a24;
            border-radius: 16px;
            padding: 20px 16px;
            text-align: right;
            font-size: 28px;
            color: #4ade80;
            font-family: monospace;
            margin-bottom: 20px;
            min-height: 80px;
        }
        .fake-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .fake-btn {
            background: #3a3a4a;
            padding: 16px;
            text-align: center;
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #ccc;
            cursor: pointer;
        }
        .fake-btn:active { background: #4a4a5a; }
        .chat-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 340px;
            max-width: calc(100vw - 40px);
            background: #0f172a;
            border-radius: 24px;
            display: none;
            z-index: 1000;
            border: 1px solid #334155;
        }
        .chat-header {
            background: #1e293b;
            padding: 12px 16px;
            border-radius: 24px 24px 0 0;
            display: flex;
            justify-content: space-between;
            color: white;
            font-weight: bold;
        }
        .chat-body {
            height: 400px;
            display: flex;
            flex-direction: column;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-size: 14px;
        }
        .msg-boy { background: #3b82f6; color: white; margin: 6px 0; padding: 8px 12px; border-radius: 18px; border-top-left-radius: 4px; max-width: 85%; }
        .msg-girl { background: #10b981; color: white; margin: 6px 0; padding: 8px 12px; border-radius: 18px; border-top-right-radius: 4px; max-width: 85%; margin-left: auto; }
        .msg-input-area { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #334155; background: #0f172a; border-radius: 0 0 24px 24px; }
        .msg-input-area input { flex: 1; padding: 10px; border-radius: 40px; border: none; background: #1e293b; color: white; }
        .msg-input-area button { background: #3b82f6; border: none; padding: 8px 16px; border-radius: 40px; color: white; }
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .login-box {
            background: #1e293b;
            padding: 24px;
            border-radius: 32px;
            width: 280px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 40px;
            border: none;
        }
        .close-icon { cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div class="fake-calculator" id="fakeCalc">
    <div class="fake-screen" id="calcScreen">0</div>
    <div class="fake-buttons">
        <div class="fake-btn" data-val="7">7</div><div class="fake-btn" data-val="8">8</div><div class="fake-btn" data-val="9">9</div><div class="fake-btn" data-val="/">÷</div>
        <div class="fake-btn" data-val="4">4</div><div class="fake-btn" data-val="5">5</div><div class="fake-btn" data-val="6">6</div><div class="fake-btn" data-val="*">×</div>
        <div class="fake-btn" data-val="1">1</div><div class="fake-btn" data-val="2">2</div><div class="fake-btn" data-val="3">3</div><div class="fake-btn" data-val="-">-</div>
        <div class="fake-btn" data-val="0">0</div><div class="fake-btn" data-val="C">C</div><div class="fake-btn" data-val="=">=</div><div class="fake-btn" data-val="+">+</div>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="chat-header">
        <span>备忘录</span>
        <span class="close-icon" id="closeChat">✕</span>
    </div>
    <div class="chat-body">
        <div class="messages-area" id="messagesArea">
            <div style="text-align:center; color:#888;">加载中...</div>
        </div>
        <div class="msg-input-area">
            <input type="text" id="messageInput" placeholder="写点什么..." autocomplete="off">
            <button id="sendBtn">发送</button>
        </div>
    </div>
</div>

<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h3 style="color:white;">验证</h3>
        <input type="password" id="loginPassword" placeholder="密码" autocomplete="off">
        <button id="loginBtn">进入</button>
        <div id="loginError" style="color:#ff6b6b; margin-top:12px; font-size:14px;"></div>
    </div>
</div>

<script>
// ==================== 计算器逻辑 ====================
let calcValue = '0';
let lastOperator = null;
let pendingValue = null;

function updateScreen() {
    document.getElementById('calcScreen').innerText = calcValue;
}

document.querySelectorAll('.fake-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const val = btn.dataset.val;
        
        if (val === 'C') {
            calcValue = '0';
            lastOperator = null;
            pendingValue = null;
            updateScreen();
        } 
        else if (val === '=') {
            if (lastOperator && pendingValue !== null) {
                const current = parseFloat(calcValue);
                let result;
                if (lastOperator === '+') result = pendingValue + current;
                else if (lastOperator === '-') result = pendingValue - current;
                else if (lastOperator === '*') result = pendingValue * current;
                else if (lastOperator === '/') result = pendingValue / current;
                calcValue = String(result);
                lastOperator = null;
                pendingValue = null;
                updateScreen();
            }
        }
        else if (['+','-','*','/'].includes(val)) {
            if (lastOperator && pendingValue !== null) {
                const current = parseFloat(calcValue);
                let result;
                if (lastOperator === '+') result = pendingValue + current;
                else if (lastOperator === '-') result = pendingValue - current;
                else if (lastOperator === '*') result = pendingValue * current;
                else if (lastOperator === '/') result = pendingValue / current;
                calcValue = String(result);
                updateScreen();
            }
            pendingValue = parseFloat(calcValue);
            lastOperator = val;
            calcValue = '0';
            updateScreen();
        }
        else {
            if (calcValue === '0') calcValue = val;
            else calcValue += val;
            updateScreen();
        }
    });
});

// ==================== 聊天逻辑 ====================
let authActive = false;
let myRole = null;
let refreshInterval = null;

// 获取 DOM 元素
const loginOverlay = document.getElementById('loginOverlay');
const chatContainer = document.getElementById('chatContainer');
const loginPassword = document.getElementById('loginPassword');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const messagesArea = document.getElementById('messagesArea');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const closeChat = document.getElementById('closeChat');

// 登录按钮事件
loginBtn.onclick = async function() {
    const pwd = loginPassword.value.trim();
    if (!pwd) {
        loginError.innerText = '请输入密码';
        return;
    }
    
    loginError.innerText = '登录中...';
    
    try {
        const resp = await fetch('/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pwd })
        });
        const data = await resp.json();
        
        if (resp.ok && data.status === 'ok') {
            authActive = true;
            myRole = data.role;
            loginOverlay.style.display = 'none';
            chatContainer.style.display = 'block';
            loadMessages();
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(loadMessages, 4000);
            startHeartbeat();
        } else {
            loginError.innerText = '密码错误';
        }
    } catch (err) {
        loginError.innerText = '网络错误：' + err.message;
    }
};

// 发送消息
sendBtn.onclick = async function() {
    const text = messageInput.value.trim();
    if (!text) return;
    
    try {
        const resp = await fetch('/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text })
        });
        if (resp.status === 401) {
            logout();
            return;
        }
        messageInput.value = '';
        loadMessages();
    } catch (err) {
        alert('发送失败');
    }
};

// 回车发送
messageInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        sendBtn.onclick();
    }
});

// 关闭聊天
closeChat.onclick = function() {
    chatContainer.style.display = 'none';
};

// 长按打开聊天（关键修复：使用正确的元素引用）
const fakeCalc = document.getElementById('fakeCalc');
let longPressTimer = null;

fakeCalc.addEventListener('touchstart', function(e) {
    // 只有点击计算器本体或屏幕区域才触发
    if (e.target === fakeCalc || e.target.classList.contains('fake-screen') || e.target.classList.contains('fake-calculator')) {
        longPressTimer = setTimeout(function() {
            if (authActive) {
                chatContainer.style.display = 'block';
            } else {
                loginOverlay.style.display = 'flex';
            }
        }, 800);
    }
});

fakeCalc.addEventListener('touchend', function() {
    if (longPressTimer) clearTimeout(longPressTimer);
});

// 鼠标版本（用于电脑调试）
fakeCalc.addEventListener('mousedown', function(e) {
    if (e.target === fakeCalc || e.target.classList.contains('fake-screen') || e.target.classList.contains('fake-calculator')) {
        longPressTimer = setTimeout(function() {
            if (authActive) {
                chatContainer.style.display = 'block';
            } else {
                loginOverlay.style.display = 'flex';
            }
        }, 800);
    }
});

window.addEventListener('mouseup', function() {
    if (longPressTimer) clearTimeout(longPressTimer);
});

// 心跳检查
async function startHeartbeat() {
    setInterval(async function() {
        if (!authActive) return;
        try {
            const resp = await fetch('/check_auth');
            const data = await resp.json();
            if (!data.valid) {
                alert('会话已过期，请重新登录');
                logout();
            } else {
                if (data.role) myRole = data.role;
            }
        } catch (err) {}
    }, 15000);
}

// 加载消息
async function loadMessages() {
    if (!authActive) return;
    try {
        const resp = await fetch('/messages');
        if (resp.status === 401) {
            logout();
            return;
        }
        const msgs = await resp.json();
        
        if (!msgs || msgs.length === 0) {
            messagesArea.innerHTML = '<div style="text-align:center; color:#888;">暂无消息，发点什么吧</div>';
            return;
        }
        
        let html = '';
        for (let i = 0; i < msgs.length; i++) {
            const m = msgs[i];
            const senderName = m.sender === 'boy' ? '我' : '她';
            const className = m.sender === 'boy' ? 'msg-boy' : 'msg-girl';
            html += '<div class="' + className + '"><strong>' + senderName + '</strong><br>' + escapeHtml(m.text) + '<div style="font-size:10px; opacity:0.6; margin-top:4px;">' + m.time + '</div></div>';
        }
        messagesArea.innerHTML = html;
        messagesArea.scrollTop = messagesArea.scrollHeight;
    } catch (err) {
        console.log('加载消息失败', err);
    }
}

// 退出登录
function logout() {
    authActive = false;
    if (refreshInterval) clearInterval(refreshInterval);
    chatContainer.style.display = 'none';
    loginOverlay.style.display = 'flex';
    loginPassword.value = '';
    loginError.innerText = '';
    localStorage.clear();
    sessionStorage.clear();
}

// 防XSS
function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}
</script>
</body>
</html>

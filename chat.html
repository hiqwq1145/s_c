<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>计算器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0b12;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    }

    .app-container {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      position: relative;
      background: radial-gradient(circle at 20% 20%, #1e1e2f, #0a0a14);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .calculator-fullscreen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 16px 16px 24px;
      background: linear-gradient(145deg, #1a1a28 0%, #0f0f1a 100%);
      box-shadow: inset 0 0 60px rgba(0,0,0,0.6);
    }

    .calc-display {
      background: #0c0c16;
      border-radius: 32px;
      margin-bottom: 20px;
      padding: 20px 20px;
      box-shadow: inset 0 8px 16px rgba(0,0,0,0.7), 0 4px 12px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
      flex: 0 0 auto;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
    }

    .calc-display .expression {
      color: #7f8c9a;
      font-size: 18px;
      font-family: 'Fira Code', monospace;
      margin-bottom: 8px;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .calc-display .result {
      color: #4ade80;
      font-size: 48px;
      font-weight: 600;
      font-family: 'Fira Code', 'JetBrains Mono', monospace;
      text-shadow: 0 0 15px rgba(74, 222, 128, 0.4);
      line-height: 1.1;
      word-break: break-all;
      text-align: right;
      width: 100%;
    }

    .calc-buttons-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 12px;
      margin-top: 8px;
    }

    .calc-btn {
      background: #252537;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 500;
      color: #e2e8f0;
      box-shadow: 0 6px 0 #15151f, 0 8px 16px rgba(0,0,0,0.5);
      transition: all 0.08s ease;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(4px);
    }

    .calc-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #0f0f18, 0 4px 10px rgba(0,0,0,0.6);
      background: #313148;
    }

    .calc-btn.operator {
      background: #3d3d5a;
      color: #ffb347;
      font-weight: 600;
      border: 1px solid rgba(255,179,71,0.2);
    }

    .calc-btn.clear {
      background: #4a2e3a;
      color: #ff7b7b;
      font-weight: 600;
    }

    .calc-btn.equals {
      background: #2e5a4a;
      color: #4ade80;
      font-weight: 700;
    }

    .secret-hint {
      position: absolute;
      top: 20px;
      right: 24px;
      color: rgba(255,255,255,0.25);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(0,0,0,0.3);
      padding: 4px 12px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .chat-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: none;
      flex-direction: column;
      z-index: 100;
      background: rgba(15, 23, 42, 0.98);
    }

    .chat-header {
      background: #1e293b;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      font-weight: 600;
      font-size: 20px;
      border-bottom: 1px solid #334155;
    }

    .chat-header .close-btn {
      font-size: 28px;
      cursor: pointer;
      color: #94a3b8;
      padding: 8px;
      border-radius: 16px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-header .close-btn:active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #0b1120;
    }

    .time-divider {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 12px 0 8px 0;
    }

    .time-divider span {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      color: #cbd5e1;
      font-size: 12px;
      padding: 5px 16px;
      border-radius: 30px;
      letter-spacing: 0.5px;
      font-weight: 500;
      font-family: monospace;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .message-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 22px;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .msg-0213 {
      background: #2563eb;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 6px;
      margin-left: auto;
    }

    .msg-开心 {
      background: #10b981;
      color: white;
      align-self: flex-start;
      border-bottom-left-radius: 6px;
      margin-right: auto;
    }

    .msg-sender {
      font-weight: 700;
      font-size: 12px;
      margin-bottom: 5px;
      opacity: 0.9;
      letter-spacing: 0.3px;
    }

    .msg-time {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 6px;
      text-align: right;
    }

    .input-area {
      display: flex;
      padding: 16px;
      gap: 10px;
      background: #1e293b;
      border-top: 1px solid #334155;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 40px;
      border: none;
      background: #0f172a;
      color: white;
      font-size: 16px;
      outline: none;
      border: 1px solid #334155;
    }

    .input-area input:focus {
      border-color: #3b82f6;
    }

    .input-area button {
      background: #3b82f6;
      border: none;
      padding: 12px 20px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(59,130,246,0.4);
      transition: all 0.1s;
    }

    .input-area button:active {
      background: #2563eb;
      transform: scale(0.96);
    }

    .login-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }

    .login-dialog {
      background: #1e293b;
      padding: 28px 24px;
      border-radius: 36px;
      width: 300px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
      border: 1px solid #334155;
    }

    .login-dialog h3 {
      color: white;
      margin-bottom: 20px;
      font-size: 22px;
      text-align: center;
    }

    .login-dialog input {
      width: 100%;
      padding: 14px 16px;
      margin: 12px 0;
      border-radius: 30px;
      border: none;
      background: #0f172a;
      color: white;
      font-size: 16px;
      border: 1px solid #475569;
    }

    .login-dialog button {
      width: 100%;
      padding: 14px;
      background: #3b82f6;
      border: none;
      border-radius: 30px;
      color: white;
      font-weight: bold;
      font-size: 18px;
      margin-top: 16px;
      cursor: pointer;
    }

    .error-text {
      color: #ff6b6b;
      margin-top: 12px;
      font-size: 14px;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    .messages-container::-webkit-scrollbar {
      width: 4px;
    }
    .messages-container::-webkit-scrollbar-track {
      background: #0f172a;
    }
    .messages-container::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="calculator-fullscreen" id="calculatorUI">
    <div class="secret-hint">
      <span>🔒 长按屏幕上方</span>
    </div>
    <div class="calc-display">
      <div class="expression" id="calcExpression"></div>
      <div class="result" id="calcResult">0</div>
    </div>
    <div class="calc-buttons-grid" id="calcButtons"></div>
  </div>

  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <span>📝 我们的备忘录</span>
      <span class="close-btn" id="closeChatBtn">✕</span>
    </div>
    <div class="messages-container" id="messagesArea">
      <div style="text-align:center;color:#94a3b8;margin-top:40px;">✨ 暂无消息</div>
    </div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="写一句悄悄话..." autocomplete="off">
      <button id="sendMessageBtn">发送</button>
    </div>
  </div>

  <div class="login-overlay hidden" id="loginOverlay">
    <div class="login-dialog">
      <h3>验证</h3>
      <input type="password" id="passwordInput" placeholder="输入密码" autocomplete="off">
      <button id="loginSubmitBtn">进入空间</button>
      <div class="error-text" id="loginError"></div>
    </div>
  </div>
</div>

<script>
  (function(){
    // ---------- 计算器 ----------
    let currentInput = '0';
    let previousInput = '';
    let operation = null;
    let shouldResetScreen = false;

    const calcResultEl = document.getElementById('calcResult');
    const calcExpressionEl = document.getElementById('calcExpression');
    const calcButtonsGrid = document.getElementById('calcButtons');

    const buttons = [
      ['C', '⌫', '%', '/'],
      ['7', '8', '9', '*'],
      ['4', '5', '6', '-'],
      ['1', '2', '3', '+'],
      ['0', '.', '=', '']
    ];

    function renderCalcButtons() {
      calcButtonsGrid.innerHTML = '';
      buttons.forEach(row => {
        row.forEach(btn => {
          if (btn === '') return;
          const btnDiv = document.createElement('div');
          btnDiv.className = 'calc-btn';
          if (btn === 'C') btnDiv.classList.add('clear');
          if (['/','*','-','+','%'].includes(btn)) btnDiv.classList.add('operator');
          if (btn === '=') btnDiv.classList.add('equals');
          btnDiv.textContent = btn;
          btnDiv.addEventListener('click', () => handleCalc(btn));
          calcButtonsGrid.appendChild(btnDiv);
        });
      });
    }

    function updateDisplay() {
      calcResultEl.textContent = currentInput;
      calcExpressionEl.textContent = operation && previousInput ? `${previousInput} ${operation}` : '';
    }

    function calculate(a, b, op) {
      const numA = parseFloat(a), numB = parseFloat(b);
      if (isNaN(numA) || isNaN(numB)) return '0';
      let res;
      switch(op){
        case '+': res = numA + numB; break;
        case '-': res = numA - numB; break;
        case '*': res = numA * numB; break;
        case '/': res = numB !== 0 ? numA / numB : '错误'; break;
        default: return b;
      }
      return res === '错误' ? '错误' : String(Math.round(res * 1000000) / 1000000);
    }

    function handleCalc(action) {
      if (action >= '0' && action <= '9' || action === '.') {
        if (shouldResetScreen) {
          currentInput = action;
          shouldResetScreen = false;
        } else {
          if (action === '.' && currentInput.includes('.')) return;
          currentInput = currentInput === '0' && action !== '.' ? action : currentInput + action;
        }
      } else if (action === 'C') {
        currentInput = '0'; previousInput = ''; operation = null; shouldResetScreen = false;
      } else if (action === '⌫') {
        currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : '0';
      } else if (action === '%') {
        currentInput = String(parseFloat(currentInput) / 100);
      } else if (['+','-','*','/'].includes(action)) {
        if (operation && !shouldResetScreen) {
          currentInput = calculate(previousInput, currentInput, operation);
        }
        previousInput = currentInput;
        operation = action;
        shouldResetScreen = true;
      } else if (action === '=') {
        if (operation && previousInput) {
          currentInput = calculate(previousInput, currentInput, operation);
          previousInput = ''; operation = null; shouldResetScreen = true;
        }
      }
      updateDisplay();
    }

    renderCalcButtons();
    updateDisplay();

    // ---------- 聊天模块（完全基于 full_time 字段）----------
    const chatPanel = document.getElementById('chatPanel');
    const loginOverlay = document.getElementById('loginOverlay');
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendMessageBtn');
    const closeChatBtn = document.getElementById('closeChatBtn');
    const passwordInput = document.getElementById('passwordInput');
    const loginSubmit = document.getElementById('loginSubmitBtn');
    const loginError = document.getElementById('loginError');

    let authActive = false;
    let refreshTimer = null;
    let heartbeatTimer = null;
    let autoScrollEnabled = true;
    let scrollDebounce = null;

    // 日期时间格式化（基于完整 ISO 字符串）
    function formatDateDivider(isoString) {
      if (!isoString) return '';
      const d = new Date(isoString);
      if (isNaN(d.getTime())) return '';
      const year = d.getFullYear();
      const month = d.getMonth() + 1;
      const day = d.getDate();
      const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      return `${year}年${month}月${day}日 ${weekdays[d.getDay()]}`;
    }

    function formatTimeOnly(isoString) {
      if (!isoString) return '';
      const d = new Date(isoString);
      if (isNaN(d.getTime())) return '';
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    }

    function isSameDay(t1, t2) {
      if (!t1 || !t2) return true;
      const d1 = new Date(t1), d2 = new Date(t2);
      return d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate();
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }

    // 滚动监听
    messagesArea.addEventListener('scroll', () => {
      if (scrollDebounce) clearTimeout(scrollDebounce);
      scrollDebounce = setTimeout(() => {
        const { scrollTop, scrollHeight, clientHeight } = messagesArea;
        autoScrollEnabled = (scrollHeight - (scrollTop + clientHeight)) < 30;
      }, 120);
    });

    function scrollToBottom() {
      messagesArea.scrollTop = messagesArea.scrollHeight;
      autoScrollEnabled = true;
    }

    async function loadMessages() {
      if (!authActive) return;
      try {
        const resp = await fetch('/messages');
        if (resp.status === 401) { logout(); return; }
        const msgs = await resp.json();
        if (!msgs.length) {
          messagesArea.innerHTML = '<div style="text-align:center;color:#94a3b8;margin-top:30px;">💬 还没有消息，发一条吧</div>';
          return;
        }

        let html = '';
        let lastDate = null;
        for (let m of msgs) {
          // 使用后端返回的 full_time 字段（一定是完整 ISO 字符串）
          const fullTime = m.full_time;
          if (fullTime && !isSameDay(lastDate, fullTime)) {
            html += `<div class="time-divider"><span>${formatDateDivider(fullTime)}</span></div>`;
          }
          lastDate = fullTime;

          const senderName = (m.sender === '0213' || m.sender === 'boy') ? '0213' : '开心';
          const bubbleClass = (m.sender === '0213' || m.sender === 'boy') ? 'msg-0213' : 'msg-开心';
          const timeStr = formatTimeOnly(fullTime);
          html += `<div class="message-bubble ${bubbleClass}">
            <div class="msg-sender">${senderName}</div>
            <div>${escapeHtml(m.text)}</div>
            <div class="msg-time">${timeStr}</div>
          </div>`;
        }
        
        const wasAuto = autoScrollEnabled;
        const oldScrollHeight = messagesArea.scrollHeight;
        const oldScrollTop = messagesArea.scrollTop;
        messagesArea.innerHTML = html;
        if (wasAuto) {
          scrollToBottom();
        } else {
          const newScrollHeight = messagesArea.scrollHeight;
          messagesArea.scrollTop = oldScrollTop + (newScrollHeight - oldScrollHeight);
        }
      } catch(e) { console.warn(e); }
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !authActive) return;
      try {
        const resp = await fetch('/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (resp.status === 401) { logout(); return; }
        messageInput.value = '';
        autoScrollEnabled = true;
        await loadMessages();
        scrollToBottom();
      } catch(e) { alert('发送失败'); }
    }

    function openChat() {
      loginOverlay.classList.add('hidden');
      chatPanel.style.display = 'flex';
      loadMessages().then(() => scrollToBottom());
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => {
        if (authActive && chatPanel.style.display === 'flex') loadMessages();
      }, 4000);
      startHeartbeat();
    }

    function closeChat() {
      chatPanel.style.display = 'none';
      if (refreshTimer) clearInterval(refreshTimer);
      if (heartbeatTimer) clearInterval(heartbeatTimer);
    }

    function logout() {
      authActive = false;
      closeChat();
      loginOverlay.classList.add('hidden');
    }

    function startHeartbeat() {
      if (heartbeatTimer) clearInterval(heartbeatTimer);
      heartbeatTimer = setInterval(async () => {
        if (!authActive) return;
        try {
          const resp = await fetch('/check_auth');
          const data = await resp.json();
          if (!data.valid) { alert('会话过期，请重新登录'); logout(); }
        } catch(e) {}
      }, 15000);
    }

    // 登录逻辑
    loginSubmit.addEventListener('click', async () => {
      const pwd = passwordInput.value.trim();
      if (!pwd) { loginError.textContent = '请输入密码'; return; }
      loginError.textContent = '验证中...';
      try {
        const resp = await fetch('/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd })
        });
        const data = await resp.json();
        if (resp.ok && data.status === 'ok') {
          authActive = true;
          openChat();
        } else {
          loginError.textContent = '密码错误';
        }
      } catch(err) {
        loginError.textContent = '网络异常';
      }
    });

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    closeChatBtn.addEventListener('click', closeChat);

    // 长按计算器区域触发
    let longPressTimer = null;
    function onLongPressStart(e) {
      if (e.target.closest('.calc-btn') || e.target.closest('.calc-display') || e.target.closest('.calculator-fullscreen') || e.target.closest('.secret-hint')) {
        longPressTimer = setTimeout(() => {
          if (authActive) {
            if (chatPanel.style.display !== 'flex') {
              chatPanel.style.display = 'flex';
              loadMessages().then(() => scrollToBottom());
              if (!refreshTimer) {
                refreshTimer = setInterval(() => {
                  if (authActive && chatPanel.style.display === 'flex') loadMessages();
                }, 4000);
              }
            }
          } else {
            loginOverlay.classList.remove('hidden');
          }
        }, 600);
      }
    }
    function cancelLongPress() {
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    }

    const calcUI = document.getElementById('calculatorUI');
    calcUI.addEventListener('touchstart', onLongPressStart, { passive: false });
    calcUI.addEventListener('touchend', cancelLongPress);
    calcUI.addEventListener('touchmove', cancelLongPress);
    calcUI.addEventListener('mousedown', onLongPressStart);
    window.addEventListener('mouseup', cancelLongPress);

    // 初始状态：只显示计算器，登录遮罩隐藏
    loginOverlay.classList.add('hidden');
    chatPanel.style.display = 'none';
  })();
</script>
</body>
</html>

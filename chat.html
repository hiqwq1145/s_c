<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私密聊天</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: system-ui;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .login-box, .chat-box {
            background: #1e293b;
            border-radius: 24px;
            padding: 24px;
            margin-top: 50px;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 40px;
            border: none;
            font-size: 16px;
        }
        button {
            background: #3b82f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .msg {
            background: #334155;
            margin: 8px 0;
            padding: 8px 16px;
            border-radius: 20px;
        }
        .msg-boy {
            background: #3b82f6;
            margin-left: 20px;
        }
        .msg-girl {
            background: #10b981;
            margin-right: 20px;
        }
        .messages-area {
            height: 60vh;
            overflow-y: auto;
            margin: 16px 0;
        }
        .error {
            color: #ef4444;
            margin-top: 12px;
        }
    </style>
</head>
<body>

<div id="loginPanel" class="login-box">
    <h2>🔐 输入密码</h2>
    <input type="password" id="password" placeholder="密码" autocomplete="off">
    <button id="loginBtn">进入</button>
    <div id="loginError" class="error"></div>
</div>

<div id="chatPanel" class="chat-box" style="display: none;">
    <div style="display: flex; justify-content: space-between;">
        <strong>💬 聊天室</strong>
        <button id="logoutBtn" style="width: auto; padding: 6px 12px; background: #475569;">退出</button>
    </div>
    <div id="messagesArea" class="messages-area">
        <div style="text-align:center; color:#888;">加载中...</div>
    </div>
    <div style="display: flex; gap: 8px;">
        <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off" style="flex:1;">
        <button id="sendBtn" style="width: auto; padding: 12px 20px;">发送</button>
    </div>
</div>

<script>
// 全局状态
let authActive = false;
let myRole = null;     // 'boy' 或 'girl'
let refreshInterval = null;

// DOM 元素
const loginPanel = document.getElementById('loginPanel');
const chatPanel = document.getElementById('chatPanel');
const passwordInput = document.getElementById('password');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const messagesArea = document.getElementById('messagesArea');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const logoutBtn = document.getElementById('logoutBtn');

// 登录
loginBtn.onclick = async () => {
    const pwd = passwordInput.value.trim();
    if (!pwd) {
        loginError.innerText = '请输入密码';
        return;
    }
    
    loginError.innerText = '登录中...';
    loginBtn.disabled = true;
    
    try {
        const resp = await fetch('/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pwd })
        });
        const data = await resp.json();
        
        if (resp.ok && data.status === 'ok') {
            authActive = true;
            myRole = data.role;  // 'boy' 或 'girl'
            loginPanel.style.display = 'none';
            chatPanel.style.display = 'block';
            loadMessages();
            // 每5秒自动刷新消息
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(loadMessages, 5000);
            startHeartbeat();
        } else {
            loginError.innerText = '密码错误，再试试看';
            loginBtn.disabled = false;
        }
    } catch (err) {
        loginError.innerText = '网络错误：' + err.message;
        loginBtn.disabled = false;
    }
};

// 保持登录状态检查
async function startHeartbeat() {
    setInterval(async () => {
        if (!authActive) return;
        try {
            const resp = await fetch('/check_auth');
            const data = await resp.json();
            if (!data.valid) {
                alert('登录已过期，请重新登录');
                logout();
            } else {
                if (data.role) myRole = data.role;
            }
        } catch (err) {
            console.log('心跳检查失败', err);
        }
    }, 15000);
}

// 加载消息
async function loadMessages() {
    if (!authActive) return;
    try {
        const resp = await fetch('/messages');
        if (resp.status === 401) {
            logout();
            return;
        }
        const msgs = await resp.json();
        
        if (msgs.length === 0) {
            messagesArea.innerHTML = '<div style="text-align:center; color:#888;">暂无消息，发一条吧</div>';
            return;
        }
        
        messagesArea.innerHTML = msgs.map(m => {
            const senderName = m.sender === 'boy' ? '我' : '她';
            const className = m.sender === 'boy' ? 'msg-boy' : 'msg-girl';
            return `<div class="msg ${className}">
                        <strong>${senderName}</strong><br>
                        ${escapeHtml(m.text)}
                        <div style="font-size: 11px; opacity: 0.6; margin-top: 4px;">${m.time}</div>
                    </div>`;
        }).join('');
        messagesArea.scrollTop = messagesArea.scrollHeight;
    } catch (err) {
        console.log('加载消息失败', err);
    }
}

// 发送消息
async function sendMsg() {
    const text = messageInput.value.trim();
    if (!text) return;
    
    try {
        const resp = await fetch('/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text })
        });
        if (resp.status === 401) {
            logout();
            return;
        }
        messageInput.value = '';
        loadMessages(); // 立即刷新
    } catch (err) {
        alert('发送失败：' + err.message);
    }
}

sendBtn.onclick = sendMsg;
messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMsg();
});

// 退出登录
function logout() {
    authActive = false;
    if (refreshInterval) clearInterval(refreshInterval);
    loginPanel.style.display = 'block';
    chatPanel.style.display = 'none';
    passwordInput.value = '';
    loginError.innerText = '';
    loginBtn.disabled = false;
    localStorage.clear();
    sessionStorage.clear();
}

logoutBtn.onclick = logout;

// 防XSS
function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}
</script>
</body>
</html>
